name: CI

on:
  push:
    branches:
    - main
    - release/*
  pull_request:
    branches:
    - main

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: true

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout
      shell: bash
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git init .
        gh auth setup-git --hostname github.com --force
        git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
        git fetch --no-tags --prune --depth=1 origin "${GITHUB_SHA}"
        git checkout --force FETCH_HEAD
        git submodule update --init --recursive

    - name: Setup .NET
      if: runner.os != 'Windows'
      shell: bash
      run: |
        if ! command -v dotnet >/dev/null 2>&1 || ! dotnet --version | grep -q '^10\.'; then
          curl -fsSL https://dot.net/v1/dotnet-install.sh -o dotnet-install.sh
          bash dotnet-install.sh --channel 10.0 --install-dir "$PWD/.dotnet"
          echo "$PWD/.dotnet" >> "$GITHUB_PATH"
          export PATH="$PWD/.dotnet:$PATH"
        fi
        dotnet --info

    - name: Setup .NET
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $dotnet = Get-Command dotnet -ErrorAction SilentlyContinue
        $hasDotNet10 = $false
        if ($dotnet) {
          $hasDotNet10 = (& dotnet --version) -match '^10\.'
        }
        if (-not $hasDotNet10) {
          $installDir = Join-Path $PWD ".dotnet"
          Invoke-WebRequest https://dot.net/v1/dotnet-install.ps1 -OutFile dotnet-install.ps1
          ./dotnet-install.ps1 -Channel 10.0 -InstallDir $installDir
          Add-Content -Path $env:GITHUB_PATH -Value $installDir
          $env:PATH = "$installDir;$env:PATH"
        }
        dotnet --info

    - name: Install wasm-tools
      run: dotnet workload install wasm-tools
    - name: Restore solution
      run: dotnet restore XamlPlayground.sln
    - name: Restore legacy web project
      run: dotnet restore src/XamlPlayground.Web/XamlPlayground.Web.csproj
    - name: Build desktop app
      run: dotnet build src/XamlPlayground.NetCore/XamlPlayground.NetCore.csproj --configuration Release --no-restore
    - name: Build browser app
      run: dotnet build src/XamlPlayground.Browser/XamlPlayground.Browser.csproj --configuration Release --no-restore /p:RunAOTCompilation=false
    - name: Build legacy web app
      run: dotnet build src/XamlPlayground.Web/XamlPlayground.Web.csproj --configuration Release --no-restore /p:RunAOTCompilation=false
    - name: Test solution
      run: dotnet test XamlPlayground.sln --configuration Release --no-restore
    - name: Pack NuGet packages
      if: runner.os == 'Linux'
      run: dotnet pack XamlPlayground.sln --configuration Release --no-build --output artifacts/packages /p:VersionSuffix=ci.${{ github.run_number }}
