name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write

concurrency:
  group: github-pages
  cancel-in-progress: false

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: true

jobs:
  deploy-to-github-pages:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git init .
        git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
        auth_header="$(printf 'x-access-token:%s' "${GITHUB_TOKEN}" | base64 | tr -d '\n')"
        git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" fetch --no-tags --prune --depth=1 origin "${GITHUB_SHA}"
        git checkout --force FETCH_HEAD
        git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" submodule update --init --recursive

    - name: Setup .NET
      run: |
        if ! command -v dotnet >/dev/null 2>&1 || ! dotnet --version | grep -q '^10\.'; then
          curl -fsSL https://dot.net/v1/dotnet-install.sh -o dotnet-install.sh
          bash dotnet-install.sh --channel 10.0 --install-dir "$PWD/.dotnet"
          echo "$PWD/.dotnet" >> "$GITHUB_PATH"
          export PATH="$PWD/.dotnet:$PATH"
        fi
        dotnet --info

    - name: Install wasm-tools
      run: dotnet workload install wasm-tools

    - name: Publish .NET Project
      run: dotnet publish src/XamlPlayground.Browser/XamlPlayground.Browser.csproj -c Release -o release --nologo

    - name: Change base-tag in index.html from / to XamlPlayground
      run: sed -i 's/<base href="\/"\/>/<base href="\/XamlPlayground\/"\/>/g' release/wwwroot/index.html

    - name: Copy index.html to 404.html
      run: cp release/wwwroot/index.html release/wwwroot/404.html

    - name: Add .nojekyll file
      run: touch release/wwwroot/.nojekyll

    - name: Commit wwwroot to GitHub Pages
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        cd release/wwwroot
        git init .
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git checkout -b gh-pages
        git add -A
        git commit -m "Deploy GitHub Pages"
        git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
        auth_header="$(printf 'x-access-token:%s' "${GITHUB_TOKEN}" | base64 | tr -d '\n')"
        git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" push --force origin gh-pages
