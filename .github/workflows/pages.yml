name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write

concurrency:
  group: github-pages
  cancel-in-progress: true

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: true

jobs:
  deploy-to-github-pages:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git init .
        gh auth setup-git --hostname github.com --force
        git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
        git fetch --no-tags --prune --depth=1 origin "${GITHUB_SHA}"
        git checkout --force FETCH_HEAD
        git submodule update --init --recursive

    - name: Setup .NET
      run: |
        if ! command -v dotnet >/dev/null 2>&1 || ! dotnet --version | grep -q '^10\.'; then
          curl -fsSL https://dot.net/v1/dotnet-install.sh -o dotnet-install.sh
          bash dotnet-install.sh --channel 10.0 --install-dir "$PWD/.dotnet"
          echo "$PWD/.dotnet" >> "$GITHUB_PATH"
          export PATH="$PWD/.dotnet:$PATH"
        fi
        dotnet --info

    - name: Install wasm-tools
      run: dotnet workload install wasm-tools

    - name: Install DotNetCompress
      run: dotnet tool install --tool-path ./.tools DotNetCompress --version 5.0.0 --no-cache

    - name: Publish .NET Project
      run: dotnet publish src/XamlPlayground.Browser/XamlPlayground.Browser.csproj -c Release -o release --nologo

    - name: Brotli Compress Output
      run: |
        ./.tools/DotNetCompress -d release/wwwroot -p '*.wasm' --format br --threads 4 --recursive
        ./.tools/DotNetCompress -d release/wwwroot -p '*.js' --format br --threads 4 --recursive
        ./.tools/DotNetCompress -d release/wwwroot -p '*.dll' --format br --threads 4 --recursive

    - name: GZip Compress Output
      run: |
        ./.tools/DotNetCompress -d release/wwwroot -p '*.wasm' --format gz --threads 4 --recursive
        ./.tools/DotNetCompress -d release/wwwroot -p '*.js' --format gz --threads 4 --recursive
        ./.tools/DotNetCompress -d release/wwwroot -p '*.dll' --format gz --threads 4 --recursive

    - name: Change base-tag in index.html from / to XamlPlayground
      run: sed -i 's/<base href="\/"\/>/<base href="\/XamlPlayground\/"\/>/g' release/wwwroot/index.html

    - name: Copy index.html to 404.html
      run: cp release/wwwroot/index.html release/wwwroot/404.html

    - name: Add .nojekyll file
      run: touch release/wwwroot/.nojekyll

    - name: Commit wwwroot to GitHub Pages
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        cd release/wwwroot
        git init .
        gh auth setup-git --hostname github.com --force
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git checkout -b gh-pages
        git add -A
        git commit -m "Deploy GitHub Pages"
        git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
        git push --force origin gh-pages

    - name: Request GitHub Pages build
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: gh api -X POST "repos/${GITHUB_REPOSITORY}/pages/builds"
